function wireLanguageProfiles(project) {
  // Load available profiles from global API + project active state
  api('GET', '/language-profiles').then(function(profiles) {
    var available = Object.keys(profiles).filter(function(k) { return k !== 'default'; }).sort();
    return api('GET', '/projects/' + project.id + '/language-profiles').then(function(data) {
      var active = data.active || [];
      var container = document.getElementById('lang-active-checkboxes');
      if (container) {
        container.innerHTML = available.map(function(lang) {
          var checked = active.indexOf(lang) >= 0 ? ' checked' : '';
          return '<label style="display:inline-flex;align-items:center;gap:.25rem;margin-right:.75rem;margin-bottom:.25rem">' +
            '<input type="checkbox" class="lang-active-cb" value="' + esc(lang) + '"' + checked + '> ' + esc(lang) + '</label>';
        }).join('');
      }
    });
  }).catch(function() {
    var container = document.getElementById('lang-active-checkboxes');
    if (container) container.innerHTML = '<span class="hint">' + t('config.langProfilesLoadFailed') + '</span>';
  });

  var saveActiveBtn = document.getElementById('btn-save-lang-active');
  if (saveActiveBtn) {
    saveActiveBtn.onclick = function() {
      var active = [];
      document.querySelectorAll('.lang-active-cb:checked').forEach(function(cb) { active.push(cb.value); });
      api('PUT', '/projects/' + project.id + '/language-profiles', { active: active }).then(function(r) {
        if (r.ok) toast(t('config.activeLanguagesSaved', {languages: active.join(', ')}), 'success');
        else toast(r.error || t('error.saveFailed'), 'error');
      });
    };
  }
}

function wirePipelineSelector() {
  var select = document.getElementById('pipeline-select');
  if (!select) return;

  var saved = select.getAttribute('data-saved') || 'auto';

  api('GET', '/pipelines').then(function(data) {
    var defs = data.definitions || {};
    var keys = Object.keys(defs).sort();
    for (var i = 0; i < keys.length; i++) {
      var name = keys[i];
      var def = defs[name];
      var opt = document.createElement('option');
      opt.value = name;
      opt.textContent = def.label || name;
      if (name === saved) opt.selected = true;
      select.appendChild(opt);
    }
  }).catch(function() {
    // If fetch fails, select still has "auto" option
  });
}

// P025: 日志查看器
function renderLogs($app) {
  updateNavActive('logs');

  // P027: Clear header meta (non-project page)
  var headerMeta = document.getElementById('page-meta');
  if (headerMeta) headerMeta.innerHTML = '';

  var currentPage = 1;
  var currentLevel = 'all';
  var pageSize = 100;

  // P026 N2: 日志自动刷新状态
  var logAutoRefreshEnabled = false;
  var logRefreshInterval = null;

  $app.innerHTML =
    '<div style="margin-bottom:1rem"><a href="#/" class="btn btn-sm">' + t('common.back') + '</a></div>' +
    '<h2 style="margin-bottom:1rem">' + t('logs.heading') + '</h2>' +
    '<div class="card" style="margin-bottom:1rem">' +
      '<div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">' +
        '<label>' + t('logs.level') + ':</label>' +
        '<select id="log-level-filter" style="padding:.3rem .5rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text)">' +
          '<option value="all">' + t('logs.allLevels') + '</option>' +
          '<option value="DEBUG">DEBUG</option>' +
          '<option value="INFO">INFO</option>' +
          '<option value="WARN">WARN</option>' +
          '<option value="ERROR">ERROR</option>' +
        '</select>' +
        '<label class="toggle" style="margin-left:auto;display:inline-flex;align-items:center;gap:.5rem;cursor:pointer">' +
          '<input type="checkbox" id="log-auto-refresh-toggle" style="margin:0">' +
          '<span style="font-size:.85rem">' + t('logs.autoRefresh') + '</span>' +
        '</label>' +
        '<span id="log-refresh-status" style="font-size:.75rem;color:var(--text-muted)"></span>' +
        '<span id="log-summary" style="color:var(--text-muted)"></span>' +
      '</div>' +
    '</div>' +
    '<div id="log-content" class="card" style="font-family:monospace;font-size:.85rem;white-space:pre-wrap;max-height:600px;overflow-y:auto;padding:1rem;line-height:1.4">' +
      '<div style="text-align:center;padding:2rem;color:var(--text-muted)">' + t('common.loading') + '...</div>' +
    '</div>' +
    '<div id="log-pagination" style="margin-top:1rem;display:flex;justify-content:center;gap:.5rem"></div>';

  function loadLogs() {
    var levelEl = document.getElementById('log-level-filter');
    if (levelEl) currentLevel = levelEl.value;

    api('GET', '/logs?level=' + currentLevel + '&page=' + currentPage + '&pageSize=' + pageSize).then(function(data) {
      var contentEl = document.getElementById('log-content');
      var summaryEl = document.getElementById('log-summary');
      var paginationEl = document.getElementById('log-pagination');

      if (!contentEl) return;

      // 显示日志内容
      if (data.lines && data.lines.length) {
        contentEl.innerHTML = data.lines.map(function(line) {
          var colored = line;
          if (line.toUpperCase().includes('[ERROR]') || line.toUpperCase().includes('[ERR]')) {
            colored = '<span style="color:var(--error)">' + esc(line) + '</span>';
          } else if (line.toUpperCase().includes('[WARN]') || line.toUpperCase().includes('[WARNING]')) {
            colored = '<span style="color:var(--warning,#ff9800)">' + esc(line) + '</span>';
          } else if (line.toUpperCase().includes('[INFO]')) {
            colored = '<span style="color:var(--text)">' + esc(line) + '</span>';
          } else if (line.toUpperCase().includes('[DEBUG]')) {
            colored = '<span style="color:var(--text-muted)">' + esc(line) + '</span>';
          } else {
            colored = esc(line);
          }
          return '<div style="padding:.2rem 0;border-bottom:1px solid var(--border-hover)">' + colored + '</div>';
        }).join('');
      } else {
        contentEl.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-muted)">' + t('logs.noLogs') + '</div>';
      }

      // 显示摘要
      if (summaryEl) {
        summaryEl.textContent = t('logs.summary', {total: data.total || 0, showing: (data.lines || []).length});
      }

      // 显示分页
      if (paginationEl && data.total > pageSize) {
        var totalPages = Math.ceil(data.total / pageSize);
        var pages = [];
        for (var i = 1; i <= totalPages; i++) {
          if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
            pages.push('<button class="btn btn-sm ' + (i === currentPage ? 'btn-primary' : '') + '" data-page="' + i + '">' + i + '</button>');
          } else if (pages[pages.length - 1] !== '...') {
            pages.push('...');
          }
        }
        paginationEl.innerHTML = pages.join(' ');

        // 分页点击事件
        paginationEl.querySelectorAll('[data-page]').forEach(function(btn) {
          btn.onclick = function() {
            currentPage = parseInt(btn.getAttribute('data-page'), 10);
            loadLogs();
          };
        });
      } else if (paginationEl) {
        paginationEl.innerHTML = '';
      }
    });
  }

  // 初始加载
  loadLogs();

  // 级别筛选事件
  var levelFilter = document.getElementById('log-level-filter');
  if (levelFilter) {
    levelFilter.onchange = function() {
      currentPage = 1;
      loadLogs();
    };
  }

  // P026 N2: 自动刷新逻辑
  function updateRefreshStatus() {
    var statusEl = document.getElementById('log-refresh-status');
    if (statusEl) {
      statusEl.textContent = logAutoRefreshEnabled ? '(30s)' : '';
    }
  }

  function startLogAutoRefresh() {
    if (logRefreshInterval) clearInterval(logRefreshInterval);
    logRefreshInterval = setInterval(function() {
      // 只在日志页面且自动刷新开启时刷新
      if (location.hash !== '#/logs' || !logAutoRefreshEnabled) {
        if (logRefreshInterval) {
          clearInterval(logRefreshInterval);
          logRefreshInterval = null;
        }
        return;
      }
      // 页面不可见时跳过刷新（但保持 interval）
      if (document.visibilityState === 'hidden') return;
      loadLogs();
    }, 30000); // 30 秒刷新间隔
    updateRefreshStatus();
  }

  function stopLogAutoRefresh() {
    if (logRefreshInterval) {
      clearInterval(logRefreshInterval);
      logRefreshInterval = null;
    }
    updateRefreshStatus();
  }

  // 自动刷新开关事件
  var autoRefreshToggle = document.getElementById('log-auto-refresh-toggle');
  if (autoRefreshToggle) {
    autoRefreshToggle.onclick = function() {
      logAutoRefreshEnabled = autoRefreshToggle.checked;
      if (logAutoRefreshEnabled) {
        startLogAutoRefresh();
      } else {
        stopLogAutoRefresh();
      }
    };
  }

  // P026 N2: 页面可见性变化处理
  var logVisibilityHandler = function() {
    if (document.visibilityState === 'visible' && logAutoRefreshEnabled && location.hash === '#/logs' && !logRefreshInterval) {
      startLogAutoRefresh();
    } else if (document.visibilityState === 'hidden') {
      // 页面隐藏时不停止 interval，让 loadLogs 内部处理 visibility
    }
  };
  document.addEventListener('visibilitychange', logVisibilityHandler);

  // P026 N2: 离开页面时清理
  var logBeforeUnloadHandler = function() {
    if (logRefreshInterval) clearInterval(logRefreshInterval);
    document.removeEventListener('visibilitychange', logVisibilityHandler);
  };
  window.addEventListener('beforeunload', logBeforeUnloadHandler);
}

function renderToolsPage($app) {

      var staleEl = document.getElementById('tools-stale-summary');
      var listEl = document.getElementById('tools-registry-list');

          : '';
      }

        return;

          '<th style="padding:.5rem">' + t('tools.colPath') + '</th>' +
          '<th style="padding:.5rem">' + t('tools.colStatus') + '</th>' +
          '<th style="padding:.5rem">' + t('tools.colActions') + '</th>' +
        '</tr></thead><tbody>' +
        entries.map(function(entry) {
          var statusBadge = entry.exists
            ? '<span class="badge badge-simple">' + t('tools.exists') + '</span>'
            : '<span class="badge" style="background:var(--warning);color:#000">' + t('tools.missing') + '</span>';
          return '<tr style="border-bottom:1px solid var(--border-hover)">' +
            '<td style="padding:.5rem;vertical-align:top">' + esc(entry.name || '—') + '</td>' +
            '<td style="padding:.5rem;font-family:monospace;font-size:.8rem;word-break:break-all;vertical-align:top">' + esc(entry.path) + '</td>' +
            '<td style="padding:.5rem;vertical-align:top">' + statusBadge + '</td>' +

              '<button class="btn btn-sm tools-unregister" data-path="' + esc(entry.path) + '">' + t('tools.unregister') + '</button>' +
            '</td></tr>';

        if (r.error) { toast(r.error, 'error'); return; }

        if (input) input.value = '';
        state.projects = [];
        loadRegistry();

          loadRegistry();
        });
      });
    };
  }

  var refreshBtn = document.getElementById('tools-btn-refresh');
  if (refreshBtn) refreshBtn.onclick = loadRegistry;

  loadRegistry();
}

function normalizeLanguageProfile(profile) {
  var copy = Object.assign({}, profile || {});
  delete copy.$schema;
  delete copy.name;
  delete copy.version;
  delete copy.language;
  return copy;
}

function downloadJson(filename, data) {
  var blob = new Blob([JSON.stringify(data, null, 2) + '\n'], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function configField(f, val) {
  var id = 'cfg-' + f.name;
  if (f.type === 'toggle') {
    return '<label class="toggle"><input type="checkbox" id="' + id + '" data-path="' + f.name + '" ' + (val ? 'checked' : '') + '><span class="slider"></span></label>';
  }
  if (f.type === 'select') {
    return '<select id="' + id + '" data-path="' + f.name + '">' +
      f.options.map(function(o) { return '<option value="' + o + '"' + (o === val ? ' selected' : '') + '>' + o + '</option>'; }).join('') + '</select>';
  }
  if (f.type === 'number') {
    return '<input type="number" id="' + id + '" data-path="' + f.name + '" value="' + val + '"' +
      (f.min !== undefined ? ' min="' + f.min + '"' : '') +
      (f.max !== undefined ? ' max="' + f.max + '"' : '') +
      (f.step !== undefined ? ' step="' + f.step + '"' : '') + '>';
  }
  return '<input type="text" id="' + id + '" data-path="' + f.name + '" value="' + esc(String(val)) + '">';
}

function collectConfigValues() {
  var updates = {};
  document.querySelectorAll('[data-path]').forEach(function(el) {
    var p = el.dataset.path;
    var val;
    if (el.type === 'checkbox') val = el.checked;
    else if (el.type === 'number') val = parseFloat(el.value);
    else val = el.value;
    setNestedVal(updates, p, val);
  });
  return updates;
}

function findProject(id) {
  if (state.currentProject && (state.currentProject.id === id || state.currentProject.name === id)) {
    return Promise.resolve(state.currentProject);
  }
  if (!state.projects.length) {
    return api('GET', '/projects').then(function(ps) {
      state.projects = ps || [];
      return state.projects.find(function(p) { return p.id === id || p.name === id; });

  return Promise.resolve(state.projects.find(function(p) { return p.id === id || p.name === id; }));
}

function planCard(plan) {
  var total = plan.total || 0;
  var done = plan.completedTasks || 0;
  var pct = total ? Math.round(done / total * 100) : 0;
  var approval = plan.approval || {};
  var pipeline = plan.pipeline || defaultPipeline(plan.complexity || 'simple');
  var priority = plan.priority || 'P2';
  var priorityColor = priority === 'P1' ? 'critical' : priority === 'P2' ? 'high' : priority === 'P3' ? 'medium' : 'low';

  return '<a href="#/projects/' + esc(state.currentProject.id) + '/plans/' + esc(plan.id) + '" class="card" style="text-decoration:none;color:inherit">' +
    '<h3>' + esc(plan.title) + '</h3>' +
    '<div style="margin:.3rem 0">' +
      '<span class="badge badge-' + priorityColor + '">' + priority + '</span> ' +
      '<span class="badge badge-' + (plan.complexity || 'simple') + '">' + (plan.complexity || 'simple') + '</span> ' +
      '<span class="badge badge-' + (plan.status === 'archived' ? 'archived' : plan.status === 'completed' ? 'approved' : plan.status === 'in_progress' ? 'active' : 'pending') + '">' + t('planCard.status.' + (plan.status || 'pending')) + '</span>' +
    '</div>' +
    '<div class="meta">' + t('planCard.tasksProgress', {done: done, total: total, pct: pct}) + '</div>' +
    '<div style="margin-top:.3rem">' +
      '<span class="badge badge-' + (plan.grillingState === 'completed' ? 'approved' : 'draft') + '">' + t('planCard.grilling') + '</span> ' +
      pipeline.map(function(p) { return '<span class="badge badge-' + (approval[p] || 'none') + '">' + esc(p) + '</span>'; }).join(' ') +
    '</div></a>';
}

function buildPipelineSteps(plan, approval) {
  var phases = plan.pipeline || defaultPipeline(plan.complexity || 'simple');
  var grillingState = plan.grillingState || 'completed';
  var steps = [{ label: t('pipeline.communication'), status: grillingState, grilling: true }].concat(phases.map(function(p) {
    return { label: capitalize(p), status: approval[p] || 'none' };
  }));

  return steps.map(function(step, i) {
    var approved = step.grilling ? step.status === 'completed' : step.status === 'approved';
    var cls = approved ? 'approved' : 'current';
    var icon = approved ? ' &#10003;' : '';
    var arrow = i < steps.length - 1 ? '<span class="arrow">&rarr;</span>' : '';
    return '<div class="step ' + cls + '">' + esc(step.label) + icon + '</div>' + arrow;
  }).join('');
}

function approvalButtons(complexity, approval, planId, projectId, pipeline, existingDocs) {
  var phases = pipeline || defaultPipeline(complexity || 'simple');
  var existing = existingDocs || [];

  // Only show approval button for the NEXT unapproved phase (sequential)
  // All previous phases must be approved before the next one becomes available
  for (var i = 0; i < phases.length; i++) {
    var phase = phases[i];
    if (approval[phase] === 'approved') continue;
    // Skip if doc doesn't exist yet (can't approve what hasn't been written)
    if (existing.indexOf(phase) === -1) continue;
    // This is the next unapproved phase — show only this button
    return '<button class="btn btn-sm btn-success" data-approve="' + esc(phase) + '" data-plan-id="' + esc(planId) + '" data-project-id="' + esc(projectId) + '">' + t('approval.approvePhase', {phase: capitalize(phase)}) + '</button>';
  }
  // All approved
  return '';
}

function defaultPipeline(complexity) {
  // Legacy backward compat
  if (complexity === 'simple') return ['tasks'];
  if (complexity === 'medium') return ['requirements', 'tasks'];
  if (complexity === 'complex') return ['requirements', 'design', 'tasks'];
  // New pipeline names
  if (complexity === 's-bugfix' || complexity === 'm-urgent' || complexity === 'hotfix') return ['tasks'];
  if (complexity === 's-feature' || complexity === 'm-bugfix') return ['requirements', 'tasks'];
  if (complexity === 'm-feature') return ['requirements', 'design', 'tasks'];
  if (complexity === 'l-feature') return ['requirements', 'design', 'test-plan', 'deployment', 'tasks'];
  if (complexity === 'l-bugfix') return ['requirements', 'design', 'test-plan', 'tasks'];
  return ['tasks']; // ultimate fallback
}

function capitalize(s) { return s ? s[0].toUpperCase() + s.slice(1) : ''; }

// Auto-grow a textarea to fit its content (no manual dragging needed)
function autoGrowTextarea(el) {
  if (!el) return;
  el.style.height = 'auto';                       // reset first to measure true scrollHeight
  el.style.height = Math.max(el.scrollHeight, window.innerHeight * 0.7) + 'px';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function getNestedVal(obj, path, def) {
  var keys = path.split('.');
  var cur = obj;
  for (var i = 0; i < keys.length; i++) {
    if (cur == null || typeof cur !== 'object') return def;
    cur = cur[keys[i]];
  }
  return cur !== undefined ? cur : def;
}

function setNestedVal(obj, path, val) {
  var keys = path.split('.');
  var cur = obj;
  for (var i = 0; i < keys.length - 1; i++) {
    if (!cur[keys[i]] || typeof cur[keys[i]] !== 'object') cur[keys[i]] = {};
    cur = cur[keys[i]];
  }
  cur[keys[keys.length - 1]] = val;
}

// ── Toast ──────────────────────────────────────
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type || 'success');
  setTimeout(function() { el.className = 'toast'; }, 3000);
}

// ── Markdown renderer (lightweight) ────────────
function renderMd(md) {
  if (!md) return '';
  var html = esc(md);

  // Code blocks (preserve content inside)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
    return '<pre><code class="language-' + lang + '">' + code + '</code></pre>';
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Tables
  html = html.replace(/((?:^\|.+\|[ ]*\n)+)/gm, function(tableBlock) {
    var rows = tableBlock.trim().split('\n');
    if (rows.length < 2) return tableBlock;
    var isSep = /^\|[\s\-:|]+\|$/;
    var headerDone = false;
    var out = '<table>';
    for (var r = 0; r < rows.length; r++) {
      if (isSep.test(rows[r])) continue;
      var cells = rows[r].split('|').filter(function(c, i, arr) { return i > 0 && i < arr.length - 1; }).map(function(c) { return c.trim(); });
      if (!headerDone) {
        out += '<tr>' + cells.map(function(c) { return '<th>' + mdInline(c) + '</th>'; }).join('') + '</tr>';
        headerDone = true;
      } else {
        out += '<tr>' + cells.map(function(c) { return '<td>' + mdInline(c) + '</td>'; }).join('') + '</tr>';
      }
    }
    return out + '</table>';
  });

  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Horizontal rules
  html = html.replace(/^---+$/gm, '<hr>');

  // Bold and italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Links: [text](url) and [text](url "title")
  html = html.replace(/\[([^\]]+)\]\(([^)]+)(?:\s+"([^"]+)")?\)/g, function(_, text, url, title) {
    return '<a href="' + esc(url) + '"' + (title ? ' title="' + esc(title) + '"' : '') + ' target="_blank">' + text + '</a>';
  });

  // Checklist items
  html = html.replace(/^- \[x\] (.+)$/gm, '<li><input type="checkbox" checked disabled> $1</li>');
  html = html.replace(/^- \[ \] (.+)$/gm, '<li><input type="checkbox" disabled> $1</li>');

  // List items
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');

  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Paragraphs
  html = html.replace(/\n\n+/g, '</p><p>');
  html = '<p>' + html + '</p>';

  // Clean up empty paragraphs around block elements
  html = html.replace(/<p>\s*(<h[1-6]>)/g, '$1');
  html = html.replace(/(<\/h[1-6]>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<table>)/g, '$1');
  html = html.replace(/(<\/table>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<hr>)/g, '$1');
  html = html.replace(/(<hr>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<blockquote>)/g, '$1');
  html = html.replace(/(<\/blockquote>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*<\/p>/g, '');

  return html;
}

function mdInline(text) {
  return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>');
}

// ── Approval click handler (delegated) ─────────
document.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-approve]');
  if (!btn) return;

  var phase = btn.dataset.approve;
  var projectId = btn.dataset.projectId;
  var planId = btn.dataset.planId;

  btn.disabled = true;
  btn.textContent = t('approval.approving');

  findProject(projectId).then(function(project) {
    if (!project) { toast(t('error.projectNotFound'), 'error'); return; }

    api('POST', '/projects/' + project.id + '/plans/' + planId + '/approve', { phase: phase }).then(function(result) {
      if (result.ok) {
        toast(t('approval.phaseApproved', {phase: capitalize(phase)}), 'success');
        route();
      } else {
        toast(result.error || t('approval.approvalFailed'), 'error');
        btn.disabled = false;
        btn.textContent = t('approval.approvePhase', {phase: capitalize(phase)});
      }
    });
  });
});

// ── Doc-view link interception ────────────────────────
// Markdown rendered in a project doc view (e.g. docs/design.md) holds relative
// links like [LLD_00](./lld/LLD_00_公共架构与规范.md). As plain <a href>, the
// browser resolves them against the page base URL (hash excluded) → /lld/... →
// 404. Intercept such clicks and route them through the SPA hash router so they
// stay inside the dashboard. External links and same-page anchors are left to
// the browser. Pure href classification lives in doc-links.js (node-tested).
document.addEventListener('click', function(e) {
  var node = e.target && e.target.closest ? e.target.closest('a') : null;
  if (!node) return;
  var raw = node.getAttribute && node.getAttribute('href');
  if (!raw) return;
  // Only intercept links rendered inside markdown content (not toolbar/sidebar).
  if (!node.closest('.md-content')) return;
  var hm = (location.hash || '').match(/^#\/projects\/([^/]+)\/docs\/(.+)$/);
  if (!hm) return; // not inside a project doc view → leave to browser
  var resolved = resolveDocLink(raw, decodeURIComponent(hm[2]));
  if (!resolved.internal) return;
  e.preventDefault();
  var newHash = '#/projects/' + encodeURIComponent(decodeURIComponent(hm[1])) +
    '/docs/' + resolved.docPath.split('/').map(encodeURIComponent).join('/');
  if (location.hash !== newHash) location.hash = newHash;
});

// ── Init ───────────────────────────────────────
window.addEventListener('hashchange', route);
applyI18n();
route();
</script>
