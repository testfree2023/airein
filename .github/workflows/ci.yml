name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run test suite
        run: bash test/run-all.sh

      - name: verify-airein host regression (node-driven)
        run: node test/test-verify-airein.js
